<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Veloura — Digital Safe Space</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23C6A769'/%3E%3C/svg%3E">

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#F8F5F2', blush: '#F3DADF', 'blush-dark': '#E8C0C8',
                        nude: '#EAD7C5', 'nude-dark': '#D9C1AA',
                        gold: '#C6A769', 'gold-light': '#D4BC8A', 'gold-dark': '#A88D50',
                        'warm-dark': '#3D3229', 'warm-mid': '#6B5D52',
                        'warm-gray': '#8B7E74', 'warm-light': '#B5A89A',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'Georgia', 'serif'],
                        sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="noise-overlay">
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
        <div class="ambient-blob blob-4"></div>
    </div>

    <div id="root" class="page-content"></div>

    <!-- React + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        /* =============================================
           KONFIGURASI — Ganti URL backend kamu di sini
           ============================================= */
        window.VELOURA_API_URL = window.VELOURA_API_URL || '';
        const BACKEND_URL = (window.VELOURA_API_URL || localStorage.getItem('veloura_backend_url') || '').replace(/\/$/, '');
        const CHAT_ENDPOINT = BACKEND_URL ? `${BACKEND_URL}/api/chat` : '/api/chat';

        /* =============================================
           DATA KUTIPAN
           ============================================= */
        const QUOTES = [
            { text: "Kamu tidak harus sempurna untuk menjadi luar biasa.", from: "Pemikiran" },
            { text: "Merawat diri bukan selfish, itu kebutuhan.", from: "Pemikiran" },
            { text: "Setiap hari adalah kesempatan baru untuk memulai.", from: "Pemikiran" },
            { text: "Perasaanmu valid, apapun itu.", from: "Pemikiran" },
            { text: "Kamu cukup, selalu cukup.", from: "Pemikiran" },
            { text: "Tidak apa-apa untuk meminta bantuan.", from: "Pemikiran" },
            { text: "Kelemahan bukan kecacatan, itu bagian dari menjadi manusia.", from: "Pemikiran" },
            { text: "Langkah kecil tetaplah langkah.", from: "Pemikiran" },
            { text: "Kamu berhak bahagia tanpa alasan.", from: "Pemikiran" },
            { text: "Menangis bukan tanda lemah, tapi tanda berani.", from: "Pemikiran" },
            { text: "Batasmu ada untuk melindungimu, bukan membatasimu.", from: "Pemikiran" },
            { text: "Hari ini kamu sudah cukup berusaha.", from: "Pemikiran" },
        ];

        /* =============================================
           DATA MOOD
           ============================================= */
        const MOODS = [
            { label: 'Senang', color: '#C6A769', bg: 'rgba(198,167,105,0.08)', hoverBg: 'rgba(198,167,105,0.15)' },
            { label: 'Tenang', color: '#7BA68E', bg: 'rgba(123,166,142,0.08)', hoverBg: 'rgba(123,166,142,0.15)' },
            { label: 'Sedih', color: '#9B8AA0', bg: 'rgba(155,138,160,0.08)', hoverBg: 'rgba(155,138,160,0.15)' },
            { label: 'Cemas', color: '#C4876E', bg: 'rgba(196,135,110,0.08)', hoverBg: 'rgba(196,135,110,0.15)' },
            { label: 'Lelah', color: '#A8958B', bg: 'rgba(168,149,139,0.08)', hoverBg: 'rgba(168,149,139,0.15)' },
            { label: 'Bingung', color: '#8B9DAF', bg: 'rgba(139,157,175,0.08)', hoverBg: 'rgba(139,157,175,0.15)' },
        ];

        /* =============================================
           UTILITAS
           ============================================= */
        const getGreeting = () => {
            const h = new Date().getHours();
            if (h >= 5 && h < 12) return 'Selamat Pagi';
            if (h >= 12 && h < 15) return 'Selamat Siang';
            if (h >= 15 && h < 18) return 'Selamat Sore';
            return 'Selamat Malam';
        };

        const formatDate = (ts) => {
            const d = new Date(ts);
            const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

        const getStore = (key, fb) => {
            try { const v = localStorage.getItem('veloura_' + key); return v ? JSON.parse(v) : fb; } catch { return fb; }
        };
        const setStore = (key, val) => { localStorage.setItem('veloura_' + key, JSON.stringify(val)); };
        const todayKey = () => new Date().toISOString().slice(0, 10);

        /* =============================================
           KOMPONEN: TOAST
           ============================================= */
        function Toast({ message, visible, onClose }) {
            const [leaving, setLeaving] = React.useState(false);
            React.useEffect(() => {
                if (visible) {
                    setLeaving(false);
                    const t1 = setTimeout(() => setLeaving(true), 2000);
                    const t2 = setTimeout(onClose, 2400);
                    return () => { clearTimeout(t1); clearTimeout(t2); };
                }
            }, [visible, message]);
            if (!visible) return null;
            return (
                <div className="toast-container">
                    <div className="toast-item" style={leaving ? { animation: 'toastOut 0.35s ease forwards' } : {}}>
                        {message}
                    </div>
                </div>
            );
        }

        /* =============================================
           KOMPONEN: SPARKLE (partikel dekoratif landing)
           ============================================= */
        function Sparkles() {
            const sparkles = React.useMemo(() =>
                Array.from({ length: 12 }, (_, i) => ({
                    id: i,
                    left: Math.random() * 100,
                    top: Math.random() * 100,
                    size: 2 + Math.random() * 4,
                    delay: Math.random() * 5,
                    duration: 3 + Math.random() * 4,
                }))
            , []);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {sparkles.map(s => (
                        <div key={s.id} className="sparkle"
                            style={{
                                left: s.left + '%', top: s.top + '%',
                                width: s.size + 'px', height: s.size + 'px',
                                animation: `sparkleFloat ${s.duration}s ease-in-out ${s.delay}s infinite`,
                            }}
                        />
                    ))}
                </div>
            );
        }

        /* =============================================
           KOMPONEN: BOTTOM NAV
           ============================================= */
        const NAV_ITEMS = [
            { hash: '#/home', label: 'Home',
              icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg> },
            { hash: '#/journal', label: 'Journal',
              icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h6a2 2 0 012 2v14a1 1 0 00-1-1H4V4z"/><path d="M20 4h-6a2 2 0 00-2 2v14a1 1 0 011-1h7V4z"/></svg> },
            { hash: '#/chat', label: 'Chat',
              icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg> },
            { hash: '#/relax', label: 'Relax',
              icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="12" cy="12" r="3.5"/><line x1="12" y1="2" x2="12" y2="6.5"/><line x1="12" y1="17.5" x2="12" y2="22"/><line x1="2" y1="12" x2="6.5" y2="12"/><line x1="17.5" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="8.1" y2="8.1"/><line x1="15.9" y1="15.9" x2="19" y2="19"/><line x1="5" y1="19" x2="8.1" y2="15.9"/><line x1="15.9" y1="8.1" x2="19" y2="5"/></svg> },
            { hash: '#/profile', label: 'Profil',
              icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
        ];

        function BottomNav({ active }) {
            return (
                <nav className="bottom-nav glass-nav safe-bottom">
                    <div className="bottom-nav-inner">
                        {NAV_ITEMS.map(item => (
                            <button key={item.hash} onClick={() => window.location.hash = item.hash}
                                className={`nav-item ${active === item.hash ? 'active' : ''}`}
                                aria-label={item.label}>
                                {item.icon}
                                <span>{item.label}</span>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        }

        /* =============================================
           HALAMAN: LANDING
           ============================================= */
        function LandingPage({ onEnter }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center px-6 relative overflow-hidden">
                    <Sparkles />
                    {/* Elemen dekoratif melayang */}
                    <div className="absolute top-20 left-6 w-32 h-32 rounded-full bg-blush/40 blur-2xl float-a" />
                    <div className="absolute top-44 right-2 w-40 h-40 rounded-full bg-nude/40 blur-2xl float-b" />
                    <div className="absolute bottom-36 left-10 w-28 h-28 rounded-full bg-gold/12 blur-2xl float-c" />
                    <div className="absolute bottom-52 right-6 w-24 h-24 rounded-full bg-blush-dark/25 blur-xl float-d" />
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full bg-gold/5 blur-3xl" />

                    <div className="relative z-10 text-center max-w-sm">
                        {/* Logo dengan ring pulse */}
                        <div className="anim-fade-up mb-10 flex justify-center">
                            <div className="relative">
                                <div className="logo-ring-pulse" />
                                <div className="logo-ring-pulse" />
                                <div className="logo-ring-pulse" />
                                <div className="w-16 h-16 rounded-full flex items-center justify-center relative z-10"
                                    style={{ background: 'linear-gradient(135deg, #C6A769, #D4BC8A, #A88D50)', boxShadow: '0 8px 32px rgba(198,167,105,0.35), inset 0 2px 6px rgba(255,255,255,0.2)' }}>
                                    <span className="font-serif text-white text-2xl font-bold" style={{ textShadow: '0 1px 3px rgba(0,0,0,0.15)' }}>V</span>
                                </div>
                            </div>
                        </div>

                        {/* Judul */}
                        <h1 className="font-serif text-5xl font-bold leading-tight anim-fade-up-d1" style={{ letterSpacing: '-0.02em' }}>
                            <span className="text-gradient-warm">Tempatmu untuk</span><br/>
                            <span className="text-gradient-gold italic font-semibold">Bernapas</span>
                        </h1>

                        {/* Line dekoratif */}
                        <div className="flex justify-center mt-6 anim-fade-up-d2">
                            <div className="line-gold-wide" />
                        </div>

                        {/* Deskripsi */}
                        <p className="mt-6 text-warm-gray text-sm leading-relaxed anim-fade-up-d3" style={{ maxWidth: '300px', marginLeft: 'auto', marginRight: 'auto' }}>
                            Veloura adalah ruang aman digital untuk perempuan modern. Curhat, menulis, bernapas — tanpa penilaian.
                        </p>

                        {/* Tombol masuk */}
                        <div className="mt-9 anim-fade-up-d4">
                            <button onClick={onEnter} className="btn-primary">
                                Masuk
                            </button>
                        </div>

                        {/* Subtle info */}
                        <p className="mt-8 text-warm-light text-xs anim-fade-up-d5" style={{ opacity: 0.7 }}>
                            Gratis dan privat. Datamu hanya tersimpan di perangkatmu.
                        </p>
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: LOGIN
           ============================================= */
        function LoginPage({ onLogin, showToast }) {
            const [name, setName] = React.useState('');
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name.trim()) { showToast('Masukkan namamu dulu ya'); return; }
                onLogin(name.trim());
            };
            return (
                <div className="min-h-screen flex flex-col items-center justify-center px-6">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-12 anim-fade-up">
                            <div className="line-gold mx-auto mb-6" />
                            <h1 className="font-serif text-4xl font-bold text-gradient-warm" style={{ letterSpacing: '-0.01em' }}>Hai, siapa namamu?</h1>
                            <p className="text-warm-gray text-sm mt-4">Panggil aku Veloura. Aku di sini untukmu.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="anim-fade-up-d1">
                            <input type="text" value={name} onChange={e => setName(e.target.value)}
                                placeholder="Ketik namamu di sini..." autoFocus maxLength={30}
                                className="glass-input" />
                            <button type="submit" className="btn-primary w-full mt-4">
                                Mulai
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: HOME / DASHBOARD
           ============================================= */
        function HomePage({ user, showToast }) {
            const [quote] = React.useState(() => QUOTES[Math.floor(Math.random() * QUOTES.length)]);
            const [todayMood, setTodayMood] = React.useState(() => {
                const moods = getStore('moods', []);
                const today = moods.filter(m => m.date === todayKey());
                return today.length > 0 ? today[today.length - 1].mood : null;
            });
            const journalCount = getStore('journals', []).length;
            const chatCount = getStore('chat', []).filter(m => m.role === 'user').length;
            const activeDays = new Set(getStore('moods', []).map(m => m.date)).size;

            const handleMood = (label) => {
                const moods = getStore('moods', []);
                moods.push({ mood: label, date: todayKey(), timestamp: Date.now() });
                setStore('moods', moods);
                setTodayMood(label);
                showToast('Mood tersimpan hari ini');
            };

            return (
                <div className="px-5 pt-6 pb-28 max-w-lg mx-auto">
                    {/* Greeting */}
                    <div className="anim-fade-up">
                        <p className="text-warm-gray text-sm font-medium">{getGreeting()}</p>
                        <h1 className="font-serif text-3xl font-bold text-gradient-warm mt-1" style={{ letterSpacing: '-0.01em' }}>{user.name}</h1>
                    </div>

                    {/* Kutipan */}
                    <div className="quote-card mt-6 anim-fade-up-d1">
                        <p className="font-serif italic text-warm-mid text-sm leading-relaxed relative z-10" style={{ paddingLeft: '4px' }}>
                            {quote.text}
                        </p>
                        <p className="text-warm-light text-xs mt-3 relative z-10">— {quote.from}</p>
                    </div>

                    {/* Mood tracker */}
                    <div className="mt-7 anim-fade-up-d2">
                        <div className="flex items-center gap-3 mb-3">
                            <div className="line-gold" />
                            <h2 className="font-serif text-lg font-semibold text-warm-dark">
                                {todayMood ? 'Perasaanmu hari ini' : 'Bagaimana perasaanmu?'}
                            </h2>
                        </div>
                        {todayMood ? (
                            <div className="mood-badge anim-scale-in">
                                <div className="mood-dot" style={{ backgroundColor: MOODS.find(m => m.label === todayMood)?.color || '#C6A769', color: MOODS.find(m => m.label === todayMood)?.color || '#C6A769' }} />
                                <span className="text-sm text-warm-dark font-medium">{todayMood}</span>
                                <span className="text-warm-light text-xs ml-auto">Tersimpan</span>
                            </div>
                        ) : (
                            <div className="flex flex-wrap gap-2">
                                {MOODS.map(m => (
                                    <button key={m.label} onClick={() => handleMood(m.label)}
                                        className="mood-pill"
                                        style={{ borderColor: m.color, color: m.color, backgroundColor: m.bg }}>
                                        {m.label}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Statistik */}
                    <div className="mt-7 anim-fade-up-d3">
                        <div className="flex items-center gap-3 mb-3">
                            <div className="line-gold" />
                            <h2 className="font-serif text-lg font-semibold text-warm-dark">Statistikmu</h2>
                        </div>
                        <div className="grid grid-cols-3 gap-3">
                            {[
                                { value: journalCount, label: 'Tulisan' },
                                { value: chatCount, label: 'Pesan' },
                                { value: activeDays, label: 'Hari Aktif' },
                            ].map(s => (
                                <div key={s.label} className="stat-card">
                                    <p className="stat-number">{s.value}</p>
                                    <p className="text-warm-light text-xs mt-1 font-medium">{s.label}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* CTA cepat */}
                    <div className="mt-7 space-y-3 anim-fade-up-d4">
                        <button onClick={() => window.location.hash = '#/chat'} className="action-card">
                            <div className="action-icon" style={{ background: 'linear-gradient(135deg, rgba(198,167,105,0.12), rgba(198,167,105,0.06))' }}>
                                <svg viewBox="0 0 24 24" fill="none" stroke="#C6A769" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                    <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
                                </svg>
                            </div>
                            <div className="text-left">
                                <p className="text-sm font-semibold text-warm-dark">Chat dengan Veloura</p>
                                <p className="text-xs text-warm-gray mt-0.5">Ceritakan apa saja yang kamu rasakan</p>
                            </div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-warm-light ml-auto flex-shrink-0">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </button>
                        <button onClick={() => window.location.hash = '#/journal'} className="action-card">
                            <div className="action-icon" style={{ background: 'linear-gradient(135deg, rgba(243,218,223,0.5), rgba(243,218,223,0.2))' }}>
                                <svg viewBox="0 0 24 24" fill="none" stroke="#C4876E" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                    <path d="M4 4h6a2 2 0 012 2v14a1 1 0 00-1-1H4V4z"/><path d="M20 4h-6a2 2 0 00-2 2v14a1 1 0 011-1h7V4z"/>
                                </svg>
                            </div>
                            <div className="text-left">
                                <p className="text-sm font-semibold text-warm-dark">Tulis di Journal</p>
                                <p className="text-xs text-warm-gray mt-0.5">Tuangkan pikiran dan perasaanmu</p>
                            </div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-warm-light ml-auto flex-shrink-0">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: JOURNAL
           ============================================= */
        function JournalPage({ showToast }) {
            const [entries, setEntries] = React.useState(() => getStore('journals', []));
            const [text, setText] = React.useState('');
            const [expanded, setExpanded] = React.useState(null);

            const handleSave = () => {
                if (!text.trim()) { showToast('Tulis sesuatu dulu ya'); return; }
                const newEntry = { id: uid(), text: text.trim(), timestamp: Date.now() };
                const updated = [newEntry, ...entries];
                setEntries(updated);
                setStore('journals', updated);
                setText('');
                showToast('Tulisan tersimpan');
            };

            const handleDelete = (id) => {
                const updated = entries.filter(e => e.id !== id);
                setEntries(updated);
                setStore('journals', updated);
                showToast('Tulisan dihapus');
            };

            return (
                <div className="px-5 pt-6 pb-28 max-w-lg mx-auto">
                    <div className="flex items-center gap-3 anim-fade-up">
                        <div className="line-gold" />
                        <h1 className="font-serif text-3xl font-bold text-gradient-warm">Journal</h1>
                    </div>
                    <p className="text-warm-gray text-sm mt-2 ml-8 anim-fade-up">Ruang pribadimu untuk menulis</p>

                    {/* Area tulis */}
                    <div className="mt-6 anim-fade-up-d1">
                        <textarea value={text} onChange={e => setText(e.target.value)}
                            placeholder="Apa yang ada di pikiranmu..." rows={4}
                            className="glass-input" style={{ resize: 'none', lineHeight: '1.7' }} />
                        <button onClick={handleSave} className="btn-primary mt-3" style={{ padding: '11px 28px' }}>
                            Simpan
                        </button>
                    </div>

                    {/* Daftar entri */}
                    <div className="mt-7 space-y-4 anim-fade-up-d2">
                        {entries.length === 0 && (
                            <div className="empty-state">
                                <div className="empty-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="#B5A89A" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" className="w-7 h-7">
                                        <path d="M4 4h6a2 2 0 012 2v14a1 1 0 00-1-1H4V4z"/><path d="M20 4h-6a2 2 0 00-2 2v14a1 1 0 011-1h7V4z"/>
                                    </svg>
                                </div>
                                <p className="text-warm-gray text-sm font-medium">Belum ada tulisan</p>
                                <p className="text-warm-light text-xs mt-1">Mulai menulis sekarang</p>
                            </div>
                        )}
                        {entries.map(entry => {
                            const isLong = entry.text.length > 120;
                            const isExpanded = expanded === entry.id;
                            const displayText = isLong && !isExpanded ? entry.text.slice(0, 120) + '...' : entry.text;
                            return (
                                <div key={entry.id} className="journal-card anim-fade-scale">
                                    <p className="text-warm-gray text-xs mb-2 font-medium">{formatDate(entry.timestamp)}</p>
                                    <p className="text-warm-dark text-sm leading-relaxed whitespace-pre-wrap" style={{ paddingLeft: '2px' }}>{displayText}</p>
                                    {isLong && (
                                        <button onClick={() => setExpanded(isExpanded ? null : entry.id)}
                                            className="text-gradient-gold text-xs font-semibold mt-2" style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                                            {isExpanded ? 'Tutup' : 'Baca selengkapnya'}
                                        </button>
                                    )}
                                    <div className="flex justify-end mt-3">
                                        <button onClick={() => handleDelete(entry.id)} className="journal-delete-btn">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                                                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                            </svg>
                                            Hapus
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: CHAT AI
           ============================================= */
        function ChatPage({ user, showToast }) {
            const INITIAL_GREETING = {
                id: 'greeting', role: 'veloura',
                text: `Hai ${user.name}, aku Veloura. Aku di sini untuk mendengarkanmu. Ada yang ingin kamu ceritakan hari ini?`,
                timestamp: Date.now()
            };
            const [messages, setMessages] = React.useState(() => {
                const saved = getStore('chat', []);
                return saved.length > 0 ? saved : [INITIAL_GREETING];
            });
            const [input, setInput] = React.useState('');
            const [typing, setTyping] = React.useState(false);
            const scrollRef = React.useRef(null);

            React.useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, typing]);
            React.useEffect(() => { setStore('chat', messages); }, [messages]);

            const handleSend = async () => {
                const trimmed = input.trim();
                if (!trimmed || typing) return;
                const userMsg = { id: uid(), role: 'user', text: trimmed, timestamp: Date.now() };
                const updated = [...messages, userMsg];
                setMessages(updated);
                setInput('');
                setTyping(true);
                try {
                    const res = await fetch(CHAT_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: trimmed })
                    });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    setMessages(prev => [...prev, { id: uid(), role: 'veloura', text: data.reply, timestamp: Date.now() }]);
                } catch (err) {
                    console.error('Chat error:', err);
                    setMessages(prev => [...prev, { id: uid(), role: 'veloura', text: 'Veloura sedang tidak bisa merespon saat ini. Coba lagi nanti ya.', timestamp: Date.now() }]);
                } finally { setTyping(false); }
            };

            const handleClear = () => {
                setMessages([INITIAL_GREETING]);
                setStore('chat', [INITIAL_GREETING]);
                showToast('Chat direset');
            };

            return (
                <div className="flex flex-col h-screen max-w-lg mx-auto">
                    {/* Header */}
                    <div className="chat-header safe-top">
                        <div className="flex items-center gap-3">
                            <div className="chat-avatar">
                                <span className="font-serif text-white text-xs font-bold">V</span>
                            </div>
                            <div>
                                <p className="text-sm font-semibold text-warm-dark">Veloura</p>
                                <p className="text-[10px] text-warm-light font-medium">Teman virtualmu</p>
                            </div>
                        </div>
                        <button onClick={handleClear} className="btn-ghost">Reset</button>
                    </div>

                    {/* Pesan */}
                    <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
                        {messages.map(msg => (
                            msg.role === 'veloura' ? (
                                <div key={msg.id} className="flex gap-2.5 items-end anim-slide-left">
                                    <div className="chat-avatar chat-avatar-sm">
                                        <span className="font-serif text-white text-[9px] font-bold">V</span>
                                    </div>
                                    <div className="chat-bubble-veloura">{msg.text}</div>
                                </div>
                            ) : (
                                <div key={msg.id} className="flex justify-end anim-slide-right">
                                    <div className="chat-bubble-user">{msg.text}</div>
                                </div>
                            )
                        ))}
                        {typing && (
                            <div className="flex gap-2.5 items-end anim-fade">
                                <div className="chat-avatar chat-avatar-sm">
                                    <span className="font-serif text-white text-[9px] font-bold">V</span>
                                </div>
                                <div className="typing-bubble">
                                    <div className="typing-dot" />
                                    <div className="typing-dot" />
                                    <div className="typing-dot" />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Input */}
                    <div className="chat-input-wrapper safe-bottom">
                        <textarea value={input} onChange={e => setInput(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                            placeholder="Ketik pesan..." rows={1} className="chat-input"
                            onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 110) + 'px'; }}
                        />
                        <button onClick={handleSend} disabled={typing || !input.trim()} className="chat-send-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: RELAKSASI
           ============================================= */
        function RelaxPage() {
            const [active, setActive] = React.useState(false);
            const [phase, setPhase] = React.useState('idle');
            const [scale, setScale] = React.useState(0.55);
            const [counter, setCounter] = React.useState(0);
            const [cycles, setCycles] = React.useState(0);

            const DUR = { inhale: 4000, hold: 4000, exhale: 4000, pause: 2000 };
            const SEC = { inhale: 4, hold: 4, exhale: 4, pause: 2 };
            const TXT = { inhale: 'Tarik napas...', hold: 'Tahan...', exhale: 'Hembuskan...', pause: '' };

            React.useEffect(() => {
                if (!active || phase === 'idle') return;
                const dur = DUR[phase];
                if (phase === 'inhale' || phase === 'hold') setScale(1);
                else setScale(0.55);
                setCounter(SEC[phase]);
                const cd = setInterval(() => setCounter(p => Math.max(0, p - 1)), 1000);
                const tm = setTimeout(() => {
                    if (phase === 'inhale') setPhase('hold');
                    else if (phase === 'hold') setPhase('exhale');
                    else if (phase === 'exhale') setPhase('pause');
                    else { setPhase('inhale'); setCycles(c => c + 1); }
                }, dur);
                return () => { clearTimeout(tm); clearInterval(cd); };
            }, [phase, active]);

            const handleToggle = () => {
                if (active) { setActive(false); setPhase('idle'); setScale(0.55); setCounter(0); setCycles(0); }
                else { setActive(true); setPhase('inhale'); setCycles(0); }
            };

            const transDur = (DUR[phase] || 1000) + 'ms';
            const glowSize = Math.round(scale * 100);
            const glowOp = (scale * 0.3).toFixed(2);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center px-5 pb-28 relative">
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div className="w-96 h-96 rounded-full bg-gold/5 blur-3xl" />
                    </div>
                    <div className="relative z-10 text-center">
                        <div className="flex items-center gap-3 justify-center anim-fade-up">
                            <div className="line-gold" />
                            <h1 className="font-serif text-3xl font-bold text-gradient-warm">Bernapas</h1>
                        </div>
                        <p className="text-warm-gray text-sm mt-2 anim-fade-up">
                            {active ? 'Ikuti alur pernapasan ini' : 'Tekan tombol untuk memulai'}
                        </p>

                        {/* Lingkaran napas */}
                        <div className="mt-14 flex items-center justify-center anim-fade-scale" style={{ animationDelay: '0.15s' }}>
                            <div className="breath-circle" style={{
                                transform: `scale(${scale})`,
                                transition: `transform ${transDur} ease-in-out, box-shadow ${transDur} ease-in-out`,
                                boxShadow: `0 0 ${glowSize}px rgba(198,167,105,${glowOp}), 0 0 ${glowSize * 2}px rgba(198,167,105,${(glowOp * 0.3).toFixed(2)}), inset 0 -4px 12px rgba(168,141,80,0.2), inset 0 4px 12px rgba(255,255,255,0.2)`,
                            }}>
                                <div className="text-center relative z-10">
                                    <p className="text-white font-serif text-base font-semibold" style={{ textShadow: '0 1px 4px rgba(0,0,0,0.1)' }}>
                                        {phase === 'idle' ? '' : TXT[phase]}
                                    </p>
                                    {phase !== 'idle' && phase !== 'pause' && (
                                        <p className="text-white/70 text-3xl font-light mt-1" style={{ fontVariantNumeric: 'tabular-nums' }}>{counter}</p>
                                    )}
                                </div>
                            </div>
                        </div>

                        {active && <p className="text-warm-light text-xs mt-8 anim-fade font-medium">Siklus ke-{cycles + 1}</p>}

                        <div className="mt-8 anim-fade-up-d2">
                            <button onClick={handleToggle}
                                className={active ? 'btn-secondary' : 'btn-primary'}>
                                {active ? 'Berhenti' : 'Mulai Bernapas'}
                            </button>
                        </div>

                        {!active && (
                            <div className="breath-guide mt-12 anim-fade-up-d3">
                                <p className="text-xs text-warm-gray leading-relaxed mb-4">
                                    Pola pernapasan 4-4-4-2 untuk menenangkan pikiran dan tubuhmu.
                                </p>
                                <div className="flex items-center justify-center gap-4 flex-wrap">
                                    {[
                                        { label: 'Tarik 4s', icon: '↓' },
                                        { label: 'Tahan 4s', icon: '◎' },
                                        { label: 'Hembuskan 4s', icon: '↑' },
                                        { label: 'Jeda 2s', icon: '·' },
                                    ].map((s, i) => (
                                        <div key={i} className="breath-step">
                                            <div className="breath-step-dot" />
                                            <span className="breath-step-text">{s.icon} {s.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* =============================================
           HALAMAN: PROFILE
           ============================================= */
        function ProfilePage({ user, onUpdateUser, onLogout, showToast }) {
            const [editing, setEditing] = React.useState(false);
            const [newName, setNewName] = React.useState(user.name);
            const [confirmReset, setConfirmReset] = React.useState(false);

            React.useEffect(() => {
                if (confirmReset) { const t = setTimeout(() => setConfirmReset(false), 3000); return () => clearTimeout(t); }
            }, [confirmReset]);

            const handleSaveName = () => {
                if (!newName.trim()) { showToast('Nama tidak boleh kosong'); return; }
                onUpdateUser(newName.trim());
                setEditing(false);
                showToast('Nama diperbarui');
            };

            const handleReset = () => {
                if (!confirmReset) { setConfirmReset(true); return; }
                ['veloura_user','veloura_journals','veloura_chat','veloura_moods'].forEach(k => localStorage.removeItem(k));
                onLogout();
                showToast('Semua data telah dihapus');
            };

            const journalCount = getStore('journals', []).length;
            const chatCount = getStore('chat', []).length;

            return (
                <div className="px-5 pt-6 pb-28 max-w-lg mx-auto">
                    <div className="flex items-center gap-3 anim-fade-up">
                        <div className="line-gold" />
                        <h1 className="font-serif text-3xl font-bold text-gradient-warm">Profil</h1>
                    </div>

                    {/* Kartu profil */}
                    <div className="glass-card-static p-6 mt-6 anim-fade-up-d1">
                        <div className="flex items-center gap-4">
                            <div className="profile-avatar">
                                <span className="profile-avatar-letter">{user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div className="flex-1 min-w-0">
                                {editing ? (
                                    <div className="flex gap-2">
                                        <input value={newName} onChange={e => setNewName(e.target.value)} maxLength={30} autoFocus className="glass-input" style={{ padding: '9px 14px', fontSize: '14px' }} />
                                        <button onClick={handleSaveName} className="btn-primary" style={{ padding: '9px 16px', fontSize: '12px' }}>Simpan</button>
                                        <button onClick={() => { setEditing(false); setNewName(user.name); }} className="btn-ghost">Batal</button>
                                    </div>
                                ) : (
                                    <>
                                        <p className="font-semibold text-warm-dark truncate text-base">{user.name}</p>
                                        <button onClick={() => setEditing(true)} className="text-gradient-gold text-xs font-semibold mt-0.5" style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Ubah nama</button>
                                    </>
                                )}
                            </div>
                        </div>

                        <div className="section-divider mt-5 mb-5" />

                        <div className="grid grid-cols-2 gap-4">
                            <div className="text-center">
                                <p className="stat-number" style={{ fontSize: '24px' }}>{journalCount}</p>
                                <p className="text-warm-light text-xs mt-1 font-medium">Tulisan</p>
                            </div>
                            <div className="text-center">
                                <p className="stat-number" style={{ fontSize: '24px' }}>{chatCount}</p>
                                <p className="text-warm-light text-xs mt-1 font-medium">Pesan chat</p>
                            </div>
                        </div>
                    </div>

                    {/* Info */}
                    <div className="info-banner mt-4 anim-fade-up-d2">
                        <p className="text-xs text-warm-mid leading-relaxed">
                            Semua datamu tersimpan secara lokal di perangkat ini dan tidak dikirim ke server manapun (kecuali pesan chat yang dikirim ke Veloura untuk diproses).
                        </p>
                    </div>

                    {/* Aksi */}
                    <div className="mt-6 space-y-3 anim-fade-up-d3">
                        <button onClick={handleReset} className={confirmReset ? 'btn-danger-confirm' : 'btn-danger-outline'}>
                            {confirmReset ? 'Yakin, hapus semua data?' : 'Hapus Semua Data'}
                        </button>
                        <button onClick={onLogout} className="btn-secondary w-full">Keluar</button>
                    </div>

                    {/* Branding */}
                    <div className="branding-footer anim-fade-up-d4">
                        <div className="branding-logo">
                            <span className="font-serif text-white text-sm font-bold">V</span>
                        </div>
                        <p className="font-serif text-sm font-semibold text-gradient-gold" style={{ background: 'linear-gradient(135deg, #A88D50, #C6A769)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Veloura</p>
                        <p className="text-warm-light text-[10px] mt-1 font-medium">Digital Safe Space untuk Perempuan Modern</p>
                    </div>
                </div>
            );
        }

        /* =============================================
           APP UTAMA
           ============================================= */
        function App() {
            const [route, setRoute] = React.useState(window.location.hash || '#/');
            const [user, setUser] = React.useState(() => getStore('user', null));
            const [toast, setToast] = React.useState({ visible: false, message: '' });

            React.useEffect(() => {
                const onHash = () => setRoute(window.location.hash || '#/');
                window.addEventListener('hashchange', onHash);
                return () => window.removeEventListener('hashchange', onHash);
            }, []);

            React.useEffect(() => {
                const protectedRoutes = ['#/home','#/journal','#/chat','#/relax','#/profile'];
                if (!user && protectedRoutes.includes(route)) window.location.hash = '#/login';
                if (user && (route === '#/' || route === '#/login')) window.location.hash = '#/home';
            }, [route, user]);

            const showToast = (msg) => setToast({ visible: true, message: msg });

            const handleLogin = (name) => {
                const u = { name, joinedAt: Date.now() };
                setUser(u); setStore('user', u);
                window.location.hash = '#/home';
            };
            const handleUpdateUser = (name) => {
                const u = { ...user, name };
                setUser(u); setStore('user', u);
            };
            const handleLogout = () => {
                setUser(null); localStorage.removeItem('veloura_user');
                window.location.hash = '#/';
            };

            const renderPage = () => {
                switch (route) {
                    case '#/': return <LandingPage onEnter={() => window.location.hash = '#/login'} />;
                    case '#/login': return <LoginPage onLogin={handleLogin} showToast={showToast} />;
                    case '#/home': return user ? (<div><HomePage user={user} showToast={showToast} /><BottomNav active={route} /></div>) : null;
                    case '#/journal': return user ? (<div><JournalPage showToast={showToast} /><BottomNav active={route} /></div>) : null;
                    case '#/chat': return user ? <ChatPage user={user} showToast={showToast} /> : null;
                    case '#/relax': return user ? (<div><RelaxPage /><BottomNav active={route} /></div>) : null;
                    case '#/profile': return user ? (<div><ProfilePage user={user} onUpdateUser={handleUpdateUser} onLogout={handleLogout} showToast={showToast} /><BottomNav active={route} /></div>) : null;
                    default: return <LandingPage onEnter={() => window.location.hash = '#/login'} />;
                }
            };

            return (
                <div>
                    {renderPage()}
                    <Toast message={toast.message} visible={toast.visible} onClose={() => setToast({ visible: false, message: '' })} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
